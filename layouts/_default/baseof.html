<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}">
<head>{{ partial "head.html" . }}</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>
  {{ partial "header.html" . }}
  <main id="main-content" tabindex="-1">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  <script src="{{ "js/theme.js" | relURL }}"></script>
</body>
</html>
